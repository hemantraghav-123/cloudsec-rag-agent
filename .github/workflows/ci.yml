name: CloudSec CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout Code
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # Step 3: Install Dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Lint Check (Basic)
    - name: Install flake8
      run: pip install flake8

    - name: Run flake8
      run: |
        flake8 app --max-line-length=120 || true

    # Step 5: Start FastAPI (Test)
    - name: Start FastAPI server
      run: |
        nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
        echo $! > uvicorn.pid

    - name: Wait for API readiness
      run: |
        for i in {1..30}; do
          if curl -sf http://127.0.0.1:8000/ > /dev/null; then
            echo "API is ready"
            exit 0
          fi
          sleep 2
        done
        echo "API failed to start in time. Last server logs:"
        tail -n 200 uvicorn.log || true
        exit 1

    # Step 6: Test API Endpoint
    - name: Test API
      run: |
        curl -f -X GET http://127.0.0.1:8000/

    # Step 7: Optional - Run ingestion
    - name: Run ingestion
      run: |
        python app/ingest.py || true
 
    # Step 8: Build Docker Image
    - name: Build Docker image
      run: |
        docker build -t cloudsec-agent .